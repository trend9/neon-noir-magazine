name: Daily Mystery Magazine Generator

on:
  schedule:
    # 12:00 UTC is exactly 21:00 JST (Japan Standard Time)
    - cron: '0 12 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub interface

permissions:
  contents: write # Required for pushing generated JSON and images to repository

jobs:
  build-and-generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-lcm-dreamshaper-v7
          restore-keys: |
            hf-models-

      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ollama-models-gemma2-2b
          restore-keys: |
            ollama-models-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install diffusers transformers accelerate fastapi uvicorn requests pillow pydantic

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama & Local API Server
        run: |
          # Start Ollama
          ollama serve &
          
          # Write local API server script
          cat << 'EOF' > local_api_server.py
          import base64
          import torch
          import requests
          from fastapi import FastAPI, HTTPException
          from pydantic import BaseModel
          from diffusers import DiffusionPipeline, LCMScheduler
          
          app = FastAPI()
          
          print("Loading LCM Stable Diffusion model on CPU...")
          pipe = DiffusionPipeline.from_pretrained("SimianLuo/LCM_Dreamshaper_v7", torch_dtype=torch.float32)
          pipe.scheduler = LCMScheduler.from_config(pipe.scheduler.config)
          pipe.to("cpu")
          print("LCM Model loaded successfully.")
          
          class TextRequest(BaseModel):
              system_prompt: str
              user_prompt: str
          
          class ImageRequest(BaseModel):
              prompt: str
              width: int = 512
              height: int = 512
          
          @app.post("/generate/text")
          async def generate_text(req: TextRequest):
              try:
                  url = "http://localhost:11434/api/chat"
                  payload = {
                      "model": "gemma2:2b",
                      "messages": [
                          {"role": "system", "content": req.system_prompt},
                          {"role": "user", "content": req.user_prompt}
                      ],
                      "stream": False
                  }
                  res = requests.post(url, json=payload, timeout=180)
                  if res.status_code == 200:
                      return {"result": res.json().get("message", {}).get("content", "")}
                  raise HTTPException(status_code=500, detail="Ollama returned error")
              except Exception as e:
                  raise HTTPException(status_code=500, detail=str(e))
          
          @app.post("/generate/image")
          async def generate_image(req: ImageRequest):
              try:
                  image = pipe(
                      prompt=req.prompt,
                      num_inference_steps=4,
                      guidance_scale=8.0,
                      width=req.width,
                      height=req.height
                  ).images[0]
                  
                  import io
                  buf = io.BytesIO()
                  image.save(buf, format="JPEG", quality=90)
                  return {"image_base64": base64.b64encode(buf.getvalue()).decode("utf-8")}
              except Exception as e:
                  raise HTTPException(status_code=500, detail=str(e))
          
          if __name__ == "__main__":
              import uvicorn
              uvicorn.run(app, host="127.0.0.1", port=8000)
          EOF
          
          # Wait for Ollama to start
          echo "Waiting for Ollama to start..."
          until curl -s http://localhost:11434 > /dev/null; do sleep 1; done
          echo "Ollama is running. Pulling gemma2:2b..."
          ollama pull gemma2:2b
          
          # Start the local API server in the background
          python local_api_server.py &
          echo "Waiting for local API server to start..."
          until curl -s http://127.0.0.1:8000 > /dev/null; do sleep 1; done
          echo "Local API server is ready!"

      - name: Ensure output directories exist
        run: |
          mkdir -p data
          mkdir -p public/stories

      - name: Run story generation script
        env:
          COLAB_API_URL: "http://127.0.0.1:8000"
        run: |
          python scripts/generate_story.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add only the database JSON and the new physical images in public/stories/
          git add data/stories.json
          git add public/stories/
          
          # Avoid failing the workflow if there are no changes to commit
          if git diff --staged --quiet; then
            echo "No changes generated today. Skipping commit."
          else
            git commit -m "chore(auto): publish daily mystery story - $(date +'%Y-%m-%d')"
            git push origin main
          fi
